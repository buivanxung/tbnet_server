<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">
    <title>TBNET PCCC Monitoring</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: #0b1220;
            color: white;
            font-family: Arial;
            margin: 0;
        }

        header {
            background: #111a2e;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        /* card */

        .card {
            background: #16223b;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .value {
            font-size: 26px;
            margin-top: 10px;
        }

        /* relay */

        .relay-panel {
            display: flex;
            justify-content: space-around;
        }

        .light {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #333;
            margin: auto;
        }

        .light.on {
            background: #ff3b3b;
            box-shadow: 0 0 10px red;
        }

        /* charts */

        .chart-box {
            grid-column: span 2;
            background: #16223b;
            padding: 20px;
            border-radius: 10px;
        }

        /* alarm popup */

        .alarm {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .alarm-box {
            background: #ff2d2d;
            padding: 40px;
            border-radius: 10px;
            font-size: 28px;
            text-align: center;
        }
    </style>

</head>

<body>

    <header>
        🔥 TBNET PCCC DEVICE MONITORING
    </header>

    <div class="container">

        <div class="card">
            <i class="fa fa-barcode"></i>
            <div>Serial</div>
            <div id="serial" class="value">-</div>
        </div>

        <div class="card">
            <i class="fa fa-battery-half"></i>
            <div>Battery</div>
            <div id="battery" class="value">-</div>
        </div>

        <div class="card">
            <i class="fa fa-plug"></i>
            <div>Source</div>
            <div id="source" class="value">-</div>
        </div>

        <div class="card">
            <i class="fa fa-bolt"></i>
            <div>Charging</div>
            <div id="charging" class="value">-</div>
        </div>

        <div class="card">
            <div>CPU Temp</div>
            <div id="cpu_temp" class="value">-</div>
        </div>

        <div class="card">
            <div>Board Temp</div>
            <div id="board_temp" class="value">-</div>
        </div>

        <div class="card">
            <div>WiFi</div>
            <div id="wifi_status" class="value">-</div>
        </div>

        <div class="card">
            <div>4G</div>
            <div id="g4_status" class="value">-</div>
        </div>

        <div class="card relay-panel">

            <div>
                <div>NO</div>
                <div id="no_light" class="light"></div>
            </div>

            <div>
                <div>NC</div>
                <div id="nc_light" class="light"></div>
            </div>

        </div>

        <div class="card">
            <div>Interface</div>
            <div id="interface" class="value">-</div>
        </div>

        <div class="chart-box">
            <canvas id="tempChart"></canvas>
        </div>

        <div class="chart-box">
            <canvas id="batteryChart"></canvas>
        </div>

    </div>

    <!-- FIRE ALARM POPUP -->

    <div id="alarm" class="alarm">

        <div class="alarm-box">

            🔥 FIRE ALARM

            <br><br>

            <div id="alarm_text"></div>

            <br>

            <button onclick="closeAlarm()">ACK</button>

        </div>

    </div>

    <script>

        let ws

        function connectWS() {

            ws = new WebSocket("ws://" + location.host)

            ws.onopen = () => {

                console.log("WS connected")

            }

            ws.onclose = () => {

                console.log("WS reconnecting...")

                setTimeout(connectWS, 3000)

            }

            ws.onmessage = (event) => {

                let d = JSON.parse(event.data)

                /* fire alarm */

                if (d.type === "fire_alarm") {

                    alarm_text.innerText =
                        "ZONE " + d.zone +
                        " (" + d.source + ")"

                    document.getElementById("alarm").style.display = "flex"

                    return

                }

                /* serial */

                serial.innerText = d.serial ?? "-"

                /* battery */

                battery.innerText = d.battery ? d.battery + "%" : "-"

                if (d.battery > 60)
                    battery.style.color = "#4caf50"
                else if (d.battery > 30)
                    battery.style.color = "#ffc107"
                else
                    battery.style.color = "#ff5252"

                /* source */

                source.innerText = d.source ?? "-"

                /* charging */

                charging.innerText = d.charging ?? "-"

                /* temp */

                cpu_temp.innerText = d.temp_cpu ? d.temp_cpu + " °C" : "-"

                board_temp.innerText = d.temp_board ? d.temp_board + " °C" : "-"

                /* wifi */

                if (d.wifi_ssid)

                    wifi_status.innerText =
                        d.wifi_ssid + " (" + d.wifi + " dBm)"

                else

                    wifi_status.innerText = "-"

                /* 4G */

                if (d.operator)

                    g4_status.innerText =
                        d.operator + " (" + d.g4 + " dBm)"

                else

                    g4_status.innerText = "-"

                /* relay */

                if (d.no_status == 1)
                    no_light.classList.add("on")
                else
                    no_light.classList.remove("on")

                if (d.nc_status == 1)
                    nc_light.classList.add("on")
                else
                    nc_light.classList.remove("on")

                /* interface */

                interface.innerText = d.active_interface ?? "-"

                /* charts */

                updateCharts(d)

            }

        }

        connectWS()

        /* charts */

        let tempChart = new Chart(
            document.getElementById("tempChart"),
            {
                type: "line",
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: "CPU Temp",
                            data: [],
                            borderColor: "#ff5252"
                        },
                        {
                            label: "Board Temp",
                            data: [],
                            borderColor: "#4fc3f7"
                        }
                    ]
                }
            })

        let batteryChart = new Chart(
            document.getElementById("batteryChart"),
            {
                type: "line",
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: "Battery %",
                            data: [],
                            borderColor: "#4caf50"
                        }
                    ]
                }
            })

        function updateCharts(d) {

            let time = new Date().toLocaleTimeString()

            tempChart.data.labels.push(time)
            tempChart.data.datasets[0].data.push(d.temp_cpu)
            tempChart.data.datasets[1].data.push(d.temp_board)

            batteryChart.data.labels.push(time)
            batteryChart.data.datasets[0].data.push(d.battery)

            if (tempChart.data.labels.length > 20) {

                tempChart.data.labels.shift()

                tempChart.data.datasets[0].data.shift()
                tempChart.data.datasets[1].data.shift()

                batteryChart.data.labels.shift()
                batteryChart.data.datasets[0].data.shift()

            }

            tempChart.update()
            batteryChart.update()

        }

        /* alarm */

        function closeAlarm() {

            document.getElementById("alarm").style.display = "none"

        }

    </script>

</body>

</html>
